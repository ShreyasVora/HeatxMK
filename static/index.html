<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatxMK - Item Spinner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>HeatxMK</h1>
            <p>Mario Kart Mod for Heat: Pedal to the Metal</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-view="spinner">Item Spinner</button>
            <button class="tab-btn" data-view="rules">Rules</button>
            <button class="tab-btn" data-view="item-details">Item Details</button>
        </nav>

        <main>
            <section id="view-spinner">
                <div class="input-group">
                    <label for="distance">Distance to First Place</label>
                    <input type="number" id="distance" min="0" value="0">
                </div>

                <div class="spinner-container">
                    <div id="item-display" class="item-display">READY?</div>
                </div>

                <button id="spin-button">GET ITEM</button>

                <div id="item-info-panel" class="info-panel" style="display: none;">
                    <!-- Description will be inserted here -->
                </div>

                <div id="weight-readout" class="weight-readout">
                    <h3>Available Items</h3>
                    <div id="weight-list" class="weight-list">
                        <!-- Weight items will be dynamically inserted here -->
                    </div>
                </div>
            </section>

            <section id="view-rules" style="display: none;">
                <div class="rules-container">
                    <h2>Item Rules</h2>
                    <p class="subtitle">Understand how each item affects the race</p>
                    <div id="rules-list" class="rules-list">
                        <!-- Items will be populated here -->
                    </div>
                </div>
            </section>

            <section id="view-item-details" style="display: none;">
                <div class="analytics-layout">
                    <aside class="item-selector">
                        <h3>Items</h3>
                        <ul id="item-list" class="item-grid">
                            <!-- Items will be populated here -->
                        </ul>
                    </aside>
                    <div class="analytics-main">
                        <div id="chart-description" class="info-panel" style="margin-top: 0; margin-bottom: 2rem; display: none;">
                            <!-- Description will be inserted here -->
                        </div>
                        <div class="chart-container">
                            <canvas id="distribution-chart"></canvas>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Specify distance and spin for your item</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
