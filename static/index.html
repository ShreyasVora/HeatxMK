<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatxMK - Item Spinner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HeatxMK</h1>
            <p>Mario Kart Mod for Heat: Pedal to the Metal</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-view="spinner">Item Spinner</button>
            <button class="tab-btn" data-view="distributions">Weight Distributions</button>
        </nav>

        <main>
            <section id="view-spinner">
                <div class="input-group">
                    <label for="distance">Distance to First Place</label>
                    <input type="number" id="distance" min="0" value="0">
                </div>

                <div class="spinner-container">
                    <div id="item-display" class="item-display">READY?</div>
                </div>

                <button id="spin-button">GET ITEM</button>
            </section>

            <section id="view-distributions" style="display: none;">
                <div class="analytics-layout">
                    <aside class="item-selector">
                        <h3>Select Item</h3>
                        <ul id="item-list">
                            <!-- Items will be populated here -->
                        </ul>
                    </aside>
                    <div class="chart-container">
                        <canvas id="distribution-chart"></canvas>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Specify distance and spin for your item</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
